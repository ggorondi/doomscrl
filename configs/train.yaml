env:
  session_duration_s: 300.0
  feature_rate_hz: 2.0
  activation_history_len: 20
  video_summary_dim: 64

observation:
  include_region_stats: false

reward:
  mode: dopamine
  alpha: 1.0
  beta: 0.3
  switch_penalty: 0.0
  min_dwell_seconds: 0.0
  short_dwell_penalty: 0.0
  cortisol_delta_scale: 0.35
  cortisol_region_weights:
    left_anterior_dorsal: 1.2
    left_anterior_ventral: 2.2
    left_posterior_dorsal: 0.8
    left_posterior_ventral: 0.7
    right_anterior_dorsal: 1.2
    right_anterior_ventral: 2.2
    right_posterior_dorsal: 0.8
    right_posterior_ventral: 0.7

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  clip_range: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

policy:
  net_arch: [256, 256]

recurrent:
  hidden_size: 256
  n_lstm_layers: 1
  shared_lstm: false
  enable_critic_lstm: true

training:
  total_timesteps: 500000
  eval_freq: 10000
  n_eval_episodes: 10
  log_dir: runs/
  seed: 42
  device: auto

runtime:
  cpu_threads_gpu: 8
  cpu_threads_cpu: 16
  interop_threads: 4

smoke_test:
  env:
    session_duration_s: 45.0
  training:
    total_timesteps: 4096
    eval_freq: 1024
    n_eval_episodes: 2

catalog:
  path: artifacts/video_catalog.json
  features_dir: artifacts/features/

brain:
  checkpoint_path: models/tribev2/fmri_encoder.pt
  hidden_dim: 1152
  n_heads: 8
  n_layers: 8
  max_seq_len: 1024
  device: auto

replay:
  prepared_root: artifacts/prepared-videos-pre-resize
  fallback_prepared_root: artifacts/prepared-videos
  output_dir: artifacts/replays
  fps: 15
  include_audio: true
  canvas_width: 1440
  canvas_height: 900
  video_panel_width: 720
  timeline_height: 96

agent:
  env_type: select
  recurrent: false

variants:
  select_baseline: {}

  scroll_random_feed:
    agent:
      env_type: scroll
      recurrent: false

  select_switch_penalty:
    reward:
      switch_penalty: 0.05
      min_dwell_seconds: 2.0
      short_dwell_penalty: 0.25

  select_recurrent_lstm:
    agent:
      env_type: select
      recurrent: true
    observation:
      include_region_stats: true

  select_cortisol:
    reward:
      mode: cortisol
      alpha: 1.0
      beta: 0.15

