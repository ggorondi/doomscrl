env:
  session_duration_s: 300.0
  feature_rate_hz: 2.0
  activation_history_len: 20
  video_summary_dim: 64

reward:
  alpha: 1.0
  beta: 0.3

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  clip_range: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

policy:
  net_arch: [256, 256]

training:
  total_timesteps: 500000
  eval_freq: 10000
  n_eval_episodes: 10
  log_dir: runs/
  seed: 42

catalog:
  path: artifacts/video_catalog.json
  features_dir: artifacts/features/

brain:
  checkpoint_path: models/tribev2/fmri_encoder.pt
  hidden_dim: 1152
  n_heads: 8
  n_layers: 8
  max_seq_len: 1024
  device: cpu
